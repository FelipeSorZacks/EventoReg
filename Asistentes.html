<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Grand Event — Asistentes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: rgba(201,168,76,0.1);
    --dark: #0a0a0a; --dark-2: #111111; --dark-3: #1a1a1a; --dark-4: #242424;
    --text: #f0ebe0; --text-muted: rgba(240,235,224,0.45); --border: rgba(201,168,76,0.22);
    --red: #e2725b;
  }
  body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .page-bg { position: fixed; inset: 0; background: radial-gradient(ellipse 70% 50% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 50%); z-index: 0; pointer-events: none; }
  .star { position: fixed; width: 2px; height: 2px; background: var(--gold); border-radius: 50%; animation: twinkle 3s ease-in-out infinite; z-index: 0; pointer-events: none; }
  @keyframes twinkle{0%,100%{opacity:0;}50%{opacity:.8;}}
  .wrapper { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 4rem 2rem 6rem; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; flex-wrap: wrap; gap: 12px; }
  .back-link { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); text-decoration: none; transition: opacity 0.2s; }
  .back-link:hover { opacity: 0.7; }
  .back-link:hover svg { transform: translateX(-3px); }
  .back-link svg { transition: transform 0.2s; }
  .top-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn-top { display: inline-flex; align-items: center; gap: 8px; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; border: 1px solid rgba(201,168,76,0.15); padding: 8px 16px; transition: all 0.2s; }
  .btn-top:hover { border-color: var(--gold); color: var(--gold); }
  .btn-top-gold { border-color: rgba(201,168,76,0.4); color: var(--gold); }
  .btn-top-gold:hover { background: rgba(201,168,76,0.06); }
  .page-header { text-align: center; margin-bottom: 4rem; animation: fadeUp 1s ease both; }
  .eyebrow { font-size: 10px; letter-spacing: 0.5em; color: var(--gold); text-transform: uppercase; margin-bottom: 1rem; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem,6vw,4.5rem); font-weight: 300; line-height: 1; margin-bottom: 0.5rem; }
  .page-title em { font-style: italic; color: var(--gold-light); }
  .divider { display: flex; align-items: center; gap: 1rem; justify-content: center; margin: 1.5rem auto; max-width: 200px; }
  .divider::before { content:''; flex:1; height:1px; background: linear-gradient(to right,transparent,var(--gold)); }
  .divider::after  { content:''; flex:1; height:1px; background: linear-gradient(to left,transparent,var(--gold)); }
  .divider-gem { width:6px;height:6px;background:var(--gold);transform:rotate(45deg); }
  .counter-area { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 0.5rem; }
  .count-badge { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border); padding: 8px 20px; font-size: 11px; letter-spacing: 0.3em; color: var(--text-muted); }
  .count-badge strong { color: var(--gold); font-weight: 500; }
  .count-badge.highlight { border-color: rgba(201,168,76,0.45); background: rgba(201,168,76,0.05); }
  .capacity-bar-wrap { width: 100%; max-width: 320px; margin-top: 4px; }
  .capacity-bar-track { height: 3px; background: rgba(201,168,76,0.12); width: 100%; }
  .capacity-bar-fill { height: 100%; background: linear-gradient(to right, var(--gold), var(--gold-light)); transition: width 0.6s ease; max-width: 100%; }
  .capacity-label { font-size: 9px; letter-spacing: 0.3em; color: var(--text-muted); text-align: center; margin-top: 6px; text-transform: uppercase; }
  .capacity-label span { color: var(--gold); }
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}

  /* List */
  .attendees-list { animation: fadeUp 1s ease 0.2s both; }
  .attendee-row { display: flex; align-items: center; gap: 1.2rem; padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); transition: background 0.2s; animation: slideIn 0.5s ease both; }
  .attendee-row:first-child { border-top: 1px solid var(--border); }
  .attendee-row:hover { background: var(--gold-dim); }
  .attendee-num { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--text-muted); min-width: 2rem; text-align: right; }
  .attendee-gem { width:8px;height:8px;background:transparent;border:1px solid var(--gold);transform:rotate(45deg);flex-shrink:0;transition:background 0.2s; }
  .attendee-row:hover .attendee-gem { background: var(--gold); }
  .attendee-info { flex: 1; }
  .attendee-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 400; }
  .attendee-date { font-size: 10px; letter-spacing: 0.2em; color: var(--text-muted); margin-top: 2px; }
  .attendee-check { font-size: 10px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; opacity: 0.7; flex-shrink: 0; }
  .attendee-tickets { font-size: 10px; letter-spacing: 0.15em; color: var(--text-muted); flex-shrink: 0; }
  .attendee-tickets strong { color: var(--gold-light); font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 300; }

  .empty-state { text-align: center; padding: 4rem 2rem; border: 1px dashed var(--border); }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; color: var(--text-muted); margin-bottom: 1rem; }
  .empty-state a { font-size: 10px; letter-spacing: 0.35em; color: var(--gold); text-decoration: none; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 2px; }
  .loading-state { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 11px; letter-spacing: 0.3em; }
  .loading-dot { display: inline-block; animation: blink 1.2s ease-in-out infinite; }
  .loading-dot:nth-child(2){animation-delay:.2s;}.loading-dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}
  footer { text-align: center; margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border); font-size: 10px; letter-spacing: 0.3em; color: var(--text-muted); }
  @media(max-width:500px){
    .top-bar{flex-direction:column;align-items:flex-start;}
    .attendee-row { flex-wrap: wrap; gap: 8px; }
    .attendee-check { display: none; }
  }
</style>
</head>
<body>
<div class="page-bg"></div>

<div class="wrapper">
  <div class="top-bar">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Volver al evento
    </a>
    <div class="top-actions">
      <a href="editar.html" class="btn-top btn-top-gold">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5l2 2-7 7H4.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Actualizar mi registro
      </a>
      <a href="admin.html" class="btn-top">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Administración
      </a>
    </div>
  </div>

  <div class="page-header">
    <p class="eyebrow">Confirmaciones</p>
    <h1 class="page-title">Lista de<br><em>asistentes</em></h1>
    <div class="divider"><div class="divider-gem"></div></div>
    <div class="counter-area">
      <div class="count-badge highlight">
        <strong id="total-count">—</strong> invitados confirmados
      </div>
      <div class="count-badge">
        <strong id="total-seats">—</strong> espacios reservados
      </div>
      <div class="capacity-bar-wrap">
        <div class="capacity-bar-track">
          <div class="capacity-bar-fill" id="capacity-bar" style="width:0%"></div>
        </div>
        <p class="capacity-label"><span id="capacity-pct">0%</span> de capacidad ocupada</p>
      </div>
    </div>
  </div>

  <div class="attendees-list" id="list-container">
    <div class="loading-state">Cargando lista<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
  </div>

  <footer>&copy; 2025 · The Grand Event · Lista de asistentes</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const MAX_CAPACITY = 150;

  const firebaseConfig = {
    apiKey: "AIzaSyCC_NG5KUl1lR75BJPc27Svc_G75bcplhM",
    authDomain: "registroeventos-f3f80.firebaseapp.com",
    projectId: "registroeventos-f3f80",
    storageBucket: "registroeventos-f3f80.firebasestorage.app",
    messagingSenderId: "203681003464",
    appId: "1:203681003464:web:2d7a2a275f12b48daa72fd",
    measurementId: "G-VDS9P70S2V"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  for(let i=0;i<30;i++){
    const s=document.createElement('div'); s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;`;
    document.body.appendChild(s);
  }

  function escHtml(s){
    return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function loadAsistentes(){
    const container=document.getElementById('list-container');
    container.innerHTML=`<div class="loading-state">Cargando lista<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>`;
    try {
      const snap=await getDocs(query(collection(db,'asistentes'),orderBy('timestamp','asc')));
      const lista=[];
      snap.forEach(d=>lista.push({id:d.id,...d.data()}));

      const totalInvitados=lista.length;
      const totalEspacios=lista.reduce((s,a)=>s+(parseInt(a.boletos_usados)||1),0);
      document.getElementById('total-count').textContent=totalInvitados;
      document.getElementById('total-seats').textContent=totalEspacios;
      const pct=Math.min(Math.round((totalEspacios/MAX_CAPACITY)*100),100);
      document.getElementById('capacity-bar').style.width=pct+'%';
      document.getElementById('capacity-pct').textContent=pct+'%';

      if(lista.length===0){
        container.innerHTML=`<div class="empty-state"><p>Aún no hay confirmaciones</p><a href="index.html">Sé el primero en registrarte</a></div>`;
        return;
      }
      container.innerHTML='';
      lista.forEach((a,i)=>{
        const boletos=parseInt(a.boletos_usados)||1;
        const row=document.createElement('div');
        row.className='attendee-row';
        row.style.animationDelay=(i*0.06)+'s';
        row.innerHTML=`
          <div class="attendee-num">${String(i+1).padStart(2,'0')}</div>
          <div class="attendee-gem"></div>
          <div class="attendee-info">
            <div class="attendee-name">${escHtml(a.nombre)}</div>
            <div class="attendee-date">Registrado el ${escHtml(a.fecha||'—')}</div>
          </div>
          <div class="attendee-tickets"><strong>${boletos}</strong> lugar${boletos!==1?'es':''}</div>
          <div class="attendee-check">✦ Confirmado</div>`;
        container.appendChild(row);
      });
    } catch(e){
      console.error(e);
      container.innerHTML=`<div class="empty-state"><p>Error al cargar la lista</p><a href="asistentes.html">Intentar de nuevo</a></div>`;
    }
  }

  loadAsistentes();
</script>
</body>
</html>
